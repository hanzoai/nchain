                      storageClassName:
                        default: do-block-storage
                        description: StorageClassName specifies the Kubernetes StorageClass
                          to use.
                        type: string
                    required:
                    - size
                    type: object
                  type:
                    default: postgresql
                    description: Type selects the database engine.
                    enum:
                    - postgresql
                    - sqlite
                    type: string
                type: object
              frontendImage:
                description: FrontendImage is the optional separate UI container image.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines when to pull the image.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
