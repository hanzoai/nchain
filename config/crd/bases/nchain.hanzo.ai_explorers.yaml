                - repository
                type: object
              indexerRef:
                description: IndexerRef is the optional name of an Indexer dependency.
                type: string
              ingress:
                description: Ingress configures external access to the explorer.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are additional annotations applied to
                      the Ingress resource.
                    type: object
                  clusterIssuer:
                    default: letsencrypt-prod
                    description: ClusterIssuer is the cert-manager ClusterIssuer to
                      use for TLS certificates.
                    type: string
                  enabled:
                    description: Enabled controls whether an Ingress resource is created.
                    type: boolean
                  hosts:
                    description: Hosts lists the hostnames for the Ingress.
                    items:
                      type: string
                    type: array
                  ingressClassName:
                    default: ingress
                    description: IngressClassName specifies the Ingress class to use.
                    type: string
                  tls:
                    default: true
                    description: TLS enables TLS termination on the Ingress.
                    type: boolean
                type: object
              resources:
                description: Resources (CPU/memory) for the explorer containers.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Limits describes the maximum amount of compute resources
                      allowed.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests describes the minimum amount of compute
                      resources required.
                    type: object
                type: object
            required:
            - backendImage
            - chainRef
            type: object
          status:
