---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: explorers.nchain.hanzo.ai
spec:
  group: nchain.hanzo.ai
  names:
    kind: Explorer
    listKind: ExplorerList
    plural: explorers
    shortNames:
    - exp
    singular: explorer
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.chainRef
      name: Chain
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.backendReady
      name: Backend
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Explorer is the Schema for the explorers API.
          It deploys a block explorer UI and API for a specific Chain.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ExplorerSpec defines the desired state of a block explorer.
            properties:
              backendImage:
                description: BackendImage is the explorer backend container image
                  (e.g., blockscout API).
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines when to pull the image.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
                required:
                - repository
                type: object
              chainRef:
                description: ChainRef is the name of the Chain to explore.
                type: string
              database:
                description: Database configures the explorer's database.
                properties:
                  credentialsSecret:
                    description: CredentialsSecret references a Secret containing
                      database credentials.
                    type: string
                  image:
                    description: Image is the database container image (ignored for
                      sqlite).
                    properties:
                      pullPolicy:
                        default: IfNotPresent
                        description: PullPolicy defines when to pull the image.
                        enum:
                        - Always
                        - IfNotPresent
                        - Never
                        type: string
                      repository:
                        description: Repository is the container image repository.
                        type: string
                      tag:
                        default: latest
                        description: Tag is the container image tag.
                        type: string
                    required:
                    - repository
                    type: object
                  storage:
                    description: Storage configures persistent storage for the database.
                    properties:
                      retentionPolicy:
                        allOf:
                        - enum:
                          - Retain
                          - Delete
                        - enum:
                          - Retain
                          - Delete
                        default: Retain
                        description: |-
                          RetentionPolicy determines whether the PVC is retained or deleted
                          when the parent resource is removed.
                        type: string
                      size:
