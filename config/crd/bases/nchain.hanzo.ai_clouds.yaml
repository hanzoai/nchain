---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clouds.nchain.hanzo.ai
spec:
  group: nchain.hanzo.ai
  names:
    kind: Cloud
    listKind: CloudList
    plural: clouds
    shortNames:
    - cloud
    singular: cloud
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.apiReadyReplicas
      name: API
      type: integer
    - jsonPath: .status.webReadyReplicas
      name: Web
      type: integer
    - jsonPath: .status.brandCount
      name: Brands
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Cloud is the Schema for the clouds API.
          It manages a multi-brand Web3 cloud platform (bootnode) with API + Web UI.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudSpec defines the desired state of Cloud.
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: Annotations are additional annotations applied to all
                  managed resources.
                type: object
              api:
                description: API configures the backend API server.
                properties:
                  autoscaling:
                    description: Autoscaling configuration.
                    properties:
                      enabled:
                        description: Enabled controls whether HPA is deployed.
                        type: boolean
                      maxReplicas:
