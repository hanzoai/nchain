                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: Requests describes the minimum amount of compute
                          resources required.
                        type: object
                    type: object
                type: object
              brands:
                description: |-
                  Brands defines the multi-tenant brand configurations.
                  A single API deployment serves all brands, routing by hostname.
                  Each brand gets its own web frontend deployment.
                items:
                  description: BrandConfig defines per-brand configuration for multi-tenant
                    deployments.
                  properties:
                    domain:
                      description: Domain is the base domain for this brand (e.g.,
                        web3.hanzo.ai).
                      type: string
                    iam:
                      description: IAM configuration for this brand.
                      properties:
                        clientID:
                          description: ClientID is the OAuth client ID.
                          type: string
                        org:
                          description: Org is the IAM organization.
                          type: string
                        url:
                          description: URL is the IAM endpoint (e.g., https://hanzo.id).
