                        format: int32
                        type: integer
                      minReplicas:
                        default: 2
                        description: MinReplicas is the minimum number of replicas.
                        format: int32
                        type: integer
                      targetCPU:
                        default: 70
                        description: TargetCPU is the target CPU utilization percentage.
                        format: int32
                        type: integer
                      targetMemory:
                        description: TargetMemory is the target memory utilization
                          percentage.
                        format: int32
                        type: integer
                    type: object
                  image:
                    description: Image for the API server.
                    properties:
                      pullPolicy:
                        default: IfNotPresent
                        description: PullPolicy defines when to pull the image.
                        enum:
                        - Always
                        - IfNotPresent
                        - Never
                        type: string
                      repository:
                        description: Repository is the container image repository.
                        type: string
                      tag:
                        default: latest
                        description: Tag is the container image tag.
                        type: string
                    required:
                    - repository
                    type: object
                  replicas:
                    default: 3
                    description: Replicas for the API deployment.
                    format: int32
                    type: integer
                  resources:
                    description: Resources for the API pods.
