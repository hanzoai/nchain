                      type: string
                    projectSlug:
                      description: ProjectSlug identifies the KMS project.
                      type: string
                    resyncInterval:
                      default: 60
                      description: ResyncInterval is the interval in seconds between
                        KMS secret re-syncs.
                      format: int32
                      minimum: 10
                      type: integer
                    secretsPath:
                      description: SecretsPath is the path within the KMS project.
                      type: string
                  required:
                  - credentialsRef
                  - envSlug
                  - managedSecretName
                  - projectSlug
                  - secretsPath
                  type: object
                type: array
              labels:
                additionalProperties:
                  type: string
                description: Labels are additional labels applied to all managed resources.
                type: object
              web:
                description: Web configures the frontend web application.
                properties:
                  autoscaling:
                    description: Autoscaling configuration.
                    properties:
                      enabled:
                        description: Enabled controls whether HPA is deployed.
                        type: boolean
                      maxReplicas:
                        default: 20
                        description: MaxReplicas is the maximum number of replicas.
                        format: int32
                        type: integer
                      minReplicas:
                        default: 2
                        description: MinReplicas is the minimum number of replicas.
                        format: int32
                        type: integer
                      targetCPU:
                        default: 70
                        description: TargetCPU is the target CPU utilization percentage.
                        format: int32
                        type: integer
                      targetMemory:
                        description: TargetMemory is the target memory utilization
                          percentage.
                        format: int32
                        type: integer
                    type: object
                  image:
                    description: Image for the web frontend.
                    properties:
                      pullPolicy:
                        default: IfNotPresent
                        description: PullPolicy defines when to pull the image.
                        enum:
                        - Always
                        - IfNotPresent
                        - Never
                        type: string
                      repository:
                        description: Repository is the container image repository.
                        type: string
                      tag:
                        default: latest
                        description: Tag is the container image tag.
                        type: string
                    required:
                    - repository
                    type: object
                  replicas:
                    default: 2
                    description: Replicas for the web deployment.
                    format: int32
                    type: integer
                  resources:
                    description: Resources for the web pods.
                    properties:
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: Limits describes the maximum amount of compute
                          resources allowed.
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: Requests describes the minimum amount of compute
                          resources required.
                        type: object
                    type: object
                type: object
            required:
            - brands
            - database
            type: object
          status:
            description: CloudStatus defines the observed state of Cloud.
            properties:
              apiReadyReplicas:
                description: APIReadyReplicas is the number of ready API replicas.
                format: int32
                type: integer
              brandCount:
                description: BrandCount is the number of configured brands.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Creating
                - Bootstrapping
                - Running
                - Degraded
                - Deleting
                type: string
              webReadyReplicas:
                description: WebReadyReplicas is the number of ready web replicas.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
