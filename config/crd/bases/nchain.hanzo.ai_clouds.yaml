                      required:
                      - clientID
                      - org
                      - url
                      type: object
                    name:
                      description: Name is the brand identifier (hanzo, lux, zoo,
                        pars).
                      type: string
                  required:
                  - domain
                  - iam
                  - name
                  type: object
                minItems: 1
                type: array
              clusterTargets:
                description: |-
                  ClusterTargets maps brand to the K8s cluster where nodes should be deployed.
                  The API uses this to create NodeCluster CRs in the right cluster.
                items:
                  description: |-
                    ClusterTarget maps a brand (or all brands) to a K8s cluster where NodeCluster
                    CRs should be created. The API uses the target cluster's kubeconfig to create
                    resources in the correct cluster.
                  properties:
                    brand:
                      description: Brand name this target applies to (or "*" for all).
                      type: string
                    kubeconfigSecret:
                      description: KubeconfigSecret is the name of the Secret containing
                        the target cluster's kubeconfig.
                      type: string
                    namespace:
                      description: Namespace where NodeCluster CRs should be created
                        in the target cluster.
                      type: string
                  required:
                  - brand
                  - kubeconfigSecret
                  - namespace
                  type: object
                type: array
              database:
                description: Database configures database connections.
                properties:
                  credentialsSecret:
                    description: |-
                      CredentialsSecret is the name of the K8s Secret containing database credentials.
                      Expected keys: database-url, redis-url, datastore-url (optional)
                    type: string
                required:
                - credentialsSecret
                type: object
              env:
                description: Env provides additional environment variables.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: |-
                        Name of the environment variable.
                        May consist of any printable ASCII characters except '='.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        fileKeyRef:
                          description: |-
                            FileKeyRef selects a key of the env file.
                            Requires the EnvFiles feature gate to be enabled.
                          properties:
                            key:
                              description: |-
                                The key within the env file. An invalid key will prevent the pod from starting.
                                The keys defined within a source may consist of any printable ASCII characters except '='.
                                During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                              type: string
                            optional:
                              default: false
                              description: |-
                                Specify whether the file or its key must be defined. If the file or key
                                does not exist, then the env var is not published.
                                If optional is set to true and the specified key does not exist,
                                the environment variable will not be set in the Pod's containers.

                                If optional is set to false and the specified key does not exist,
                                an error will be returned during Pod creation.
                              type: boolean
                            path:
                              description: |-
                                The path within the volume from which to select the file.
                                Must be relative and may not contain the '..' path or start with '..'.
                              type: string
                            volumeName:
                              description: The name of the volume mount containing
                                the env file.
                              type: string
                          required:
                          - key
                          - path
                          - volumeName
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                type: array
              features:
                description: Features controls which platform features are enabled.
                properties:
                  bundler:
                    description: Bundler enables ERC-4337 account abstraction bundling.
                    type: boolean
                  gas:
                    default: true
                    description: Gas enables gas estimation API.
                    type: boolean
                  nfts:
                    default: true
                    description: NFTs enables NFT API.
                    type: boolean
                  wallets:
                    default: true
                    description: Wallets enables smart wallet management.
                    type: boolean
                  webhooks:
                    default: true
                    description: Webhooks enables webhook subscriptions.
                    type: boolean
                type: object
              imagePullSecrets:
                description: ImagePullSecrets for pulling container images.
                items:
                  type: string
                type: array
              ingress:
                description: Ingress configures external access for all brands.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are additional annotations applied to
                      the Ingress resource.
                    type: object
                  clusterIssuer:
                    default: letsencrypt-prod
                    description: ClusterIssuer is the cert-manager ClusterIssuer to
                      use for TLS certificates.
                    type: string
                  enabled:
                    description: Enabled controls whether an Ingress resource is created.
                    type: boolean
                  hosts:
                    description: Hosts lists the hostnames for the Ingress.
                    items:
                      type: string
                    type: array
                  ingressClassName:
                    default: ingress
                    description: IngressClassName specifies the Ingress class to use.
                    type: string
                  tls:
                    default: true
                    description: TLS enables TLS termination on the Ingress.
                    type: boolean
                type: object
              kmsSecrets:
                description: KMSSecrets configures KMS secret syncing.
                items:
                  description: KMSSecretRef generates a KMSSecret CR to sync secrets
                    from Hanzo KMS into a Kubernetes Secret.
                  properties:
                    credentialsRef:
                      description: CredentialsRef references a Kubernetes Secret containing
                        KMS credentials.
                      properties:
                        name:
                          description: name is unique within a namespace to reference
                            a secret resource.
                          type: string
                        namespace:
                          description: namespace defines the space within which the
                            secret name must be unique.
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    envSlug:
                      description: EnvSlug identifies the KMS environment.
                      type: string
                    hostAPI:
                      default: https://kms.hanzo.ai/api
                      description: HostAPI is the KMS API endpoint.
                      type: string
                    managedSecretName:
                      description: ManagedSecretName is the name of the Kubernetes
